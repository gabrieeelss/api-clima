<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima - API</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container py-5">

    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card shadow">
          <div class="card-body">

            <h3 class="text-center mb-4">🌤 Consulta do Clima</h3>

            <div class="input-group mb-3">
              <input type="text" id="cidade" class="form-control" placeholder="Digite a cidade">
              <button class="btn btn-primary" id="btnBuscar">Buscar</button>
            </div>

            <div id="resultado" class="mt-4 text-center">
              <p class="text-muted">Digite uma cidade para consultar</p>
            </div>

          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
